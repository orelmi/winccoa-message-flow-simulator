<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WinCC OA — Message Flow (Mobile)</title>
<meta name="description" content="Mobile interactive simulator visualizing message flows between WinCC OA managers.">
<meta name="author" content="Visuel Concept">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #0a0e1a;
  color: #e0e0e0;
  overflow: hidden;
  height: 100vh;
  height: 100dvh;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
}

/* Layout */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
}

/* Step bar — fixed at top */
#step-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 40;
  background: rgba(17, 24, 39, 0.92);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(30, 58, 95, 0.5);
  padding: 6px 12px;
  padding-top: max(6px, env(safe-area-inset-top));
  min-height: 36px;
  display: flex;
  align-items: center;
  gap: 8px;
}
#step-bar .step-num {
  background: #1e3a5f;
  color: #60a5fa;
  font-size: 11px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 10px;
  white-space: nowrap;
  flex-shrink: 0;
}
#step-bar .step-text {
  font-size: 11px;
  color: #d1d5db;
  line-height: 1.4;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
}
#step-bar .step-text code {
  background: #1e293b;
  padding: 1px 4px;
  border-radius: 3px;
  font-family: 'Consolas', 'Fira Code', monospace;
  color: #fbbf24;
  font-size: 10px;
}
#step-bar .idle-text {
  color: #6b7280;
  font-size: 11px;
  font-style: italic;
}
.scenario-intro-content {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.scenario-intro-title {
  font-weight: 700;
  color: #60a5fa;
  font-size: 12px;
}
.scenario-intro-desc {
  color: #d1d5db;
  font-size: 10px;
  line-height: 1.3;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* Canvas fills remaining space */
#canvas-area {
  flex: 1;
  position: relative;
  overflow: hidden;
}
canvas {
  display: block;
  touch-action: none;
}

/* Control bar — fixed at bottom */
#mobile-controls {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 40;
  background: rgba(17, 24, 39, 0.95);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-top: 1px solid #1e3a5f;
  padding: 8px 20px;
  padding-bottom: max(8px, env(safe-area-inset-bottom));
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
}

.ctrl-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 2px solid #334155;
  background: #1e293b;
  color: #e2e8f0;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.15s;
  flex-shrink: 0;
}
.ctrl-btn:active {
  transform: scale(0.9);
  background: #334155;
}
.ctrl-btn.active {
  border-color: #3b82f6;
  background: rgba(29, 78, 216, 0.3);
  color: #60a5fa;
}

/* Play/Pause — larger and prominent */
.ctrl-play {
  width: 56px;
  height: 56px;
  border-color: #3b82f6;
  background: #1d4ed8;
  color: #fff;
}
.ctrl-play:active {
  background: #2563eb;
}

.ctrl-spacer {
  flex: 1;
}

/* ── Full-screen scenario menu ── */
.mobile-menu {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 100;
  background: linear-gradient(135deg, #0a0e1a 0%, #111827 100%);
  flex-direction: column;
  align-items: center;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 20px 16px;
  padding-top: max(20px, env(safe-area-inset-top));
  padding-bottom: max(20px, env(safe-area-inset-bottom));
}
.mobile-menu.visible {
  display: flex;
}
.mobile-menu-header {
  text-align: center;
  margin-bottom: 16px;
  flex-shrink: 0;
}
.mobile-menu-logo {
  height: 36px;
  margin-bottom: 10px;
}
.mobile-menu-title {
  color: #e2e8f0;
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 2px;
}
.mobile-menu-subtitle {
  color: #64748b;
  font-size: 12px;
}
.mobile-menu-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  width: 100%;
  max-width: 520px;
  flex: 1;
  align-content: start;
}
.mobile-tile {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  padding: 10px;
  background: #1e293b;
  border: 1px solid #334155;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.15s;
  color: #e2e8f0;
  text-align: left;
}
.mobile-tile:active {
  background: #1d4ed8;
  border-color: #3b82f6;
  transform: scale(0.97);
}
.mobile-tile-icon {
  font-size: 22px;
  color: #60a5fa;
  line-height: 1;
  margin-bottom: 4px;
}
.mobile-tile-num {
  font-size: 9px;
  color: #60a5fa;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 2px;
}
.mobile-tile-label {
  font-size: 13px;
  font-weight: 700;
  line-height: 1.2;
  margin-bottom: 4px;
}
.mobile-tile-desc {
  font-size: 9px;
  color: #9ca3af;
  line-height: 1.3;
}
.mobile-menu-footer {
  margin-top: 12px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 16px;
}

/* Language toggle */
.lang-toggle {
  display: flex;
  border: 1px solid #334155;
  border-radius: 6px;
  overflow: hidden;
}
.lang-btn {
  padding: 5px 10px;
  background: #1e293b;
  color: #64748b;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all 0.15s;
}
.lang-btn:active { background: #334155; }
.lang-btn.active { background: #1d4ed8; color: #fff; }

/* Speed control */
.speed-control {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: #64748b;
}
.speed-control input[type=range] {
  width: 60px;
  accent-color: #3b82f6;
}

/* Landscape: shrink controls */
@media (orientation: landscape) and (max-height: 500px) {
  #step-bar {
    padding: 3px 8px;
    min-height: 24px;
  }
  #step-bar .step-num { font-size: 9px; padding: 1px 6px; }
  #step-bar .step-text { font-size: 9px; -webkit-line-clamp: 2; }
  #step-bar .idle-text { font-size: 9px; }
  .scenario-intro-title { font-size: 10px; }
  .scenario-intro-desc { font-size: 9px; }

  #mobile-controls {
    padding: 4px 12px;
    gap: 12px;
  }
  .ctrl-btn { width: 36px; height: 36px; }
  .ctrl-btn svg { width: 18px; height: 18px; }
  .ctrl-play { width: 44px; height: 44px; }
  .ctrl-play svg { width: 22px; height: 22px; }
}

</style>
</head>

<!-- Hidden elements required by core JS (engine.js, i18n.js, state.js, renderer.js) -->
<div id="compat-hidden" style="display:none">
  <button id="btn-dpget"></button>
  <button id="btn-dpset"></button>
  <button id="btn-dpconnect"></button>
  <button id="btn-plclive"></button>
  <button id="btn-cycle"></button>
  <button id="btn-history"></button>
  <button id="btn-kafka"></button>
  <button id="btn-mcp"></button>
  <button id="btn-uns"></button>
  <button id="btn-prev"></button>
  <button id="btn-step"></button>
  <button id="btn-start-scenario"></button>
  <button id="btn-reset"></button>
  <button id="lang-fr" class="lang-btn active"></button>
  <button id="lang-en" class="lang-btn"></button>
  <input type="range" id="speed" min="1" max="5" value="3" step="1">
  <span id="speed-label"></span>
  <div id="info-panel">
    <div id="panel-drag-handle"><button id="panel-toggle-btn"></button></div>
    <div id="panel-body">
      <table id="sub-table"><thead><tr><th id="th-mgr"></th><th></th><th></th></tr></thead><tbody id="sub-body"></tbody></table>
      <div><span id="panel-pi-title"></span><div id="pi-values"></div></div>
    </div>
  </div>
</div>

<!-- Visible UI -->
<div id="app">
  <div id="step-bar">
    <div class="idle-text" id="idle-msg"></div>
    <span class="step-num" id="step-num" style="display:none"></span>
    <div class="step-text" id="step-text" style="display:none"></div>
    <div id="scenario-intro" style="display:none">
      <div class="scenario-intro-content">
        <span class="scenario-intro-title" id="intro-title"></span>
        <span class="scenario-intro-desc" id="intro-desc"></span>
      </div>
    </div>
  </div>
  <div id="canvas-area">
    <canvas id="canvas"></canvas>
  </div>
</div>

<!-- Control bar -->
<div id="mobile-controls">
  <button id="ctrl-restart" class="ctrl-btn" aria-label="Restart" onclick="mobileRestart()">
    <svg viewBox="0 0 24 24" width="22" height="22"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z" fill="currentColor"/></svg>
  </button>
  <button id="ctrl-play-pause" class="ctrl-btn ctrl-play" aria-label="Play" onclick="togglePlayPause()">
    <svg id="icon-play" viewBox="0 0 24 24" width="28" height="28"><polygon points="7,3 21,12 7,21" fill="currentColor"/></svg>
    <svg id="icon-pause" viewBox="0 0 24 24" width="28" height="28" style="display:none"><rect x="5" y="3" width="5" height="18" rx="1" fill="currentColor"/><rect x="14" y="3" width="5" height="18" rx="1" fill="currentColor"/></svg>
  </button>
  <div class="ctrl-spacer"></div>
  <button id="ctrl-overview" class="ctrl-btn" aria-label="Overview" onclick="toggleOverview()">
    <svg viewBox="0 0 24 24" width="22" height="22"><path d="M3 3h7v2H5v5H3V3zm11 0h7v2h-5v5h-2V3zM3 14h2v5h5v2H3v-7zm13 5h-5v2h7v-7h-2v5z" fill="currentColor"/></svg>
  </button>
</div>

function layoutManagers(w, h) {
  var isMobile = w < 768 || (w < 1024 && h < 500);
  var isPortrait = isMobile && h > w * 1.1;
  var scale;

  if (isPortrait) {
    scale = Math.max(Math.min(w / 480, h / 850), 0.45);
  } else {
    scale = isMobile ? Math.max(Math.min(w / 900, h / 450), 0.38) : 1;
  }

  currentScale = scale;
  mgrW = Math.round(baseMgrW * scale);
  mgrH = Math.round(baseMgrH * scale);

  if (isPortrait) {
    layoutPortrait(w, h, scale);
  } else {
    layoutLandscape(w, h, scale, isMobile);
  }
}

// Portrait: vertical spine PLC->Driver->EV->DM->NGA->PGSQL
// CTRL branches left, UIs branch right
function layoutPortrait(w, h, scale) {
  var cx = w / 2;
  var colW = Math.min((w - mgrW - 16) / 2, mgrW * 1.3);
  var leftCol = cx - colW;
  var rightCol = cx + colW;

  var pad = 8;
  var rowH = (h - pad * 2) / 6;

  // Vertical spine (center column)
  mgrPos.plc =    { x: cx, y: pad + rowH * 0.5 };
  mgrPos.driver = { x: cx, y: pad + rowH * 1.5 };
  mgrPos.ev =     { x: cx, y: pad + rowH * 2.5 };
  mgrPos.dm =     { x: cx, y: pad + rowH * 3.5 };
  mgrPos.nga =    { x: cx, y: pad + rowH * 4.3 };
  mgrPos.pgsql =  { x: cx, y: pad + rowH * 5.2 };

  // Left branch: CTRL at same row as EV
  mgrPos.ctrl_pid = { x: leftCol, y: pad + rowH * 2.5 };

  // Right branch: UIs stacked around EV row
  var uiGap = mgrH * 0.55;
  mgrPos.ui1 = { x: rightCol, y: pad + rowH * 2.5 - uiGap };
  mgrPos.ui2 = { x: rightCol, y: pad + rowH * 2.5 + uiGap };

  // Inside extension managers (right column, below UIs)
  var insideExtY = pad + rowH * 3.5;
  mgrPos.js_mgr =     { x: rightCol, y: insideExtY };
  mgrPos.mcp_server = { x: rightCol, y: insideExtY };
  mgrPos.mqtt_pub =   { x: rightCol, y: insideExtY };

  // Outside extension managers (right column, further down)
  var extSpacing = mgrH + 8 * scale;
  var extY = pad + rowH * 4.5;

  mgrPos.kafka =       { x: rightCol, y: extY };
  mgrPos.pred_maint =  { x: rightCol, y: extY + extSpacing };

  mgrPos.claude_app =  { x: rightCol, y: extY };
  mgrPos.anthropic =   { x: rightCol, y: extY + extSpacing };

  mgrPos.mqtt_broker = { x: rightCol, y: extY };
  var unsSubY = extY + extSpacing;
  mgrPos.uns_mes =  { x: leftCol, y: unsSubY };
  mgrPos.uns_hist = { x: rightCol, y: unsSubY };
}

// Landscape: horizontal layout (existing design, improved space usage)
function layoutLandscape(w, h, scale, isMobile) {
  var panelOffset = isMobile ? 0 : 280;
  var cx = (w - panelOffset) / 2;
  var cy = h / 2;

  // Use more space on mobile
  var rx, ry;
  if (isMobile) {
    rx = Math.min(cx * 0.58, 280 * scale);
    ry = Math.min(cy * 0.58, 180 * scale);
  } else {
    rx = Math.min(cx * 0.50, 240 * scale);
    ry = Math.min(cy * 0.48, 150 * scale);
  }

  // EV center
  mgrPos.ev = { x: cx, y: cy - 16 * scale };
  // DM below EV
  mgrPos.dm = { x: cx - rx * 0.45, y: cy + ry * 0.85 };
  // NGA below EV, right side
  mgrPos.nga = { x: cx + rx * 0.45, y: cy + ry * 0.85 };
  // PostgreSQL database — external, below NGA
  mgrPos.pgsql = { x: cx + rx * 0.45, y: cy + ry * 1.55 };
  // Driver left of EV
  mgrPos.driver = { x: cx - rx, y: cy - 16 * scale };
  // PLC far left (outside WinCC OA boundary)
  mgrPos.plc = { x: cx - rx * 1.7, y: cy - 16 * scale };
  // CTRL top right
  mgrPos.ctrl_pid = { x: cx + rx * 0.6, y: cy - ry * 0.9 };
  // 2 UI Managers stacked vertically on the right
  var uiX = cx + rx * 1.05;
  var uiSpacing = mgrH + 10 * scale;
  mgrPos.ui1 = { x: uiX, y: cy - uiSpacing / 2 - 4 * scale };
  mgrPos.ui2 = { x: uiX, y: cy + uiSpacing / 2 + 4 * scale };
  // Inside-WinCC-OA extension managers (one per scenario, shared position)
  var insideExtX = uiX + mgrW + 40 * scale;
  var extSpacing = mgrH + 10 * scale;
  var extTopY = cy - extSpacing - 8 * scale;

  // JS Manager, MCP Server, MQTT Publisher share the same inside position
  mgrPos.js_mgr = { x: insideExtX, y: cy };
  mgrPos.mcp_server = { x: insideExtX, y: cy };
  mgrPos.mqtt_pub = { x: insideExtX, y: cy };

  // Outside-WinCC-OA managers (further right, stacked vertically)
  var outsideExtX = insideExtX + mgrW + (isMobile ? 40 : 100);

  // Kafka scenario: Broker Kafka, Predictive Maintenance
  mgrPos.kafka = { x: outsideExtX, y: extTopY };
  mgrPos.pred_maint = { x: outsideExtX, y: extTopY + extSpacing };

  // MCP scenario: Claude Desktop App, Anthropic API
  mgrPos.claude_app = { x: outsideExtX, y: extTopY };
  mgrPos.anthropic = { x: outsideExtX, y: extTopY + extSpacing };

  // UNS scenario: MQTT Broker on top, MES and Cloud Historian side by side below
  mgrPos.mqtt_broker = { x: outsideExtX, y: extTopY };
  var unsSubY = extTopY + extSpacing + 16 * scale;
  mgrPos.uns_mes = { x: outsideExtX - mgrW/2 - 16 * scale, y: unsSubY };
  mgrPos.uns_hist = { x: outsideExtX + mgrW/2 + 16 * scale, y: unsSubY };
}

var messages = []; // { from, to, label, color, progress, speed, onDone }

function addMessage(fromId, toId, label, color, duration) {
  if (replayMode) return Promise.resolve();
  checkCancelled();
  return new Promise(function(resolve) {
    messages.push({
      from: fromId, to: toId, label: label, color: color,
      progress: 0,
      speed: 1 / (duration / (1000 / 60)),
      onDone: resolve,
    });
    // 3D camera fly-to target
    if (typeof flyTo3D === 'function') flyTo3D(toId);
  });
}

// Send messages in parallel (returns when all are done)
function addMessagesParallel(arr) {
  if (replayMode) return Promise.resolve();
  checkCancelled();
  return Promise.all(arr.map(function(a) { return addMessage(a.from, a.to, a.label, a.color, a.duration); }));
}

function drawRoundedRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function getCanvasScale() {
  return currentScale;
}

function drawManager(id) {
  var m = managers[id];
  var p = mgrPos[id];
  if (!p) return;
  var x = p.x - mgrW/2, y = p.y - mgrH/2;
  var s = getCanvasScale();

  // Glow
  if (glowManagers[id]) {
    var g = glowManagers[id];
    var alpha = Math.sin(g.t / g.duration * Math.PI) * 0.5;
    ctx.save();
    ctx.shadowColor = g.color;
    ctx.shadowBlur = 25 * s;
    drawRoundedRect(x - 3 * s, y - 3 * s, mgrW + 6 * s, mgrH + 6 * s, 10 * s);
    ctx.fillStyle = g.color.replace(')', ',' + alpha + ')').replace('rgb', 'rgba');
    ctx.fill();
    ctx.restore();
  }

  // Box
  drawRoundedRect(x, y, mgrW, mgrH, 8 * s);
  ctx.fillStyle = m.style === 'dashed' ? '#141c2b' : '#1e293b';
  ctx.fill();
  ctx.strokeStyle = m.color;
  ctx.lineWidth = 2 * s;
  if (m.style === 'dashed') ctx.setLineDash([6 * s, 4 * s]);
  ctx.stroke();
  ctx.setLineDash([]);

  // Label
  var lines = m.label.split('\n');
  var fontSize1 = Math.round(12 * s);
  var fontSize2 = Math.round(11 * s);
  ctx.fillStyle = '#e2e8f0';
  ctx.font = '600 ' + fontSize1 + 'px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  var lineH = Math.round(15 * s);
  var startY = p.y - ((lines.length - 1) * lineH) / 2;
  lines.forEach(function(line, i) {
    ctx.fillStyle = i === 0 ? '#fff' : m.color;
    ctx.font = i === 0 ? '600 ' + fontSize1 + 'px "Segoe UI", system-ui, sans-serif' : fontSize2 + 'px "Segoe UI", system-ui, sans-serif';
    ctx.fillText(line, p.x, startY + i * lineH);
  });
}

function drawArrow(x1, y1, x2, y2, color, progress, label) {
  var s = getCanvasScale();
  // Clamp endpoints to manager box edges
  var dx = x2 - x1, dy = y2 - y1;
  var dist = Math.sqrt(dx*dx + dy*dy);
  if (dist < 1) return;
  var nx = dx/dist, ny = dy/dist;

  // offset start/end from box edges (scaled)
  var startDist = mgrW * 0.35;
  var endDist = mgrW * 0.35;
  var sx = x1 + nx * startDist, sy = y1 + ny * startDist;
  var ex = x2 - nx * endDist, ey = y2 - ny * endDist;

  var segDx = ex - sx, segDy = ey - sy;
  var segDist = Math.sqrt(segDx*segDx + segDy*segDy);

  // Trail
  ctx.beginPath();
  ctx.moveTo(sx, sy);
  var px = sx + segDx * progress, py = sy + segDy * progress;
  ctx.lineTo(px, py);
  ctx.strokeStyle = color;
  ctx.lineWidth = Math.max(2, 3 * s);
  ctx.globalAlpha = 0.8;
  ctx.stroke();
  ctx.globalAlpha = 1;

  // Arrowhead
  if (progress > 0.05) {
    var aLen = Math.max(6, 10 * s);
    var angle = Math.atan2(segDy, segDx);
    ctx.beginPath();
    ctx.moveTo(px, py);
    ctx.lineTo(px - aLen * Math.cos(angle - 0.4), py - aLen * Math.sin(angle - 0.4));
    ctx.lineTo(px - aLen * Math.cos(angle + 0.4), py - aLen * Math.sin(angle + 0.4));
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
  }

  // Dot at head
  ctx.beginPath();
  ctx.arc(px, py, Math.max(3, 5 * s), 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();
  ctx.beginPath();
  ctx.arc(px, py, Math.max(5, 8 * s), 0, Math.PI * 2);
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5 * s;
  ctx.globalAlpha = 0.4;
  ctx.stroke();
  ctx.globalAlpha = 1;

  // Label
  if (label) {
    var fontSize = Math.max(8, Math.round(11 * s));
    var lx = sx + segDx * Math.min(progress, 0.55);
    var ly = sy + segDy * Math.min(progress, 0.55) - 14 * s;
    ctx.font = '600 ' + fontSize + 'px "Consolas", "Fira Code", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    // background
    var tw = ctx.measureText(label).width + 10 * s;
    drawRoundedRect(lx - tw/2, ly - 14 * s, tw, 17 * s, 4 * s);
    ctx.fillStyle = 'rgba(17,24,39,0.9)';
    ctx.fill();
    ctx.strokeStyle = color;
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillStyle = color;
    ctx.fillText(label, lx, ly);
  }
}

function draw() {
  ctx.clearRect(0, 0, canvasW, canvasH);

  // Grid dots
  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  for (var x = 0; x < canvasW; x += 30) {
    for (var y = 0; y < canvasH; y += 30) {
      ctx.fillRect(x, y, 1, 1);
    }
  }

  // WinCC OA boundary box
  if (mgrPos.plc && mgrPos.driver) {
    var boundLeft = mgrPos.driver.x - mgrW/2 - 20;
    var boundTop = Math.min(
      mgrPos.ctrl_pid ? mgrPos.ctrl_pid.y - mgrH/2 - 30 : mgrPos.ev.y - mgrH/2 - 30,
      mgrPos.ui1 ? mgrPos.ui1.y - mgrH/2 - 30 : 9999
    );
    // Include inside-ext managers (js_mgr, mcp_server, mqtt_pub) only when visible
    var insideExtRight = Math.max(
      (isManagerVisible('js_mgr') && mgrPos.js_mgr) ? mgrPos.js_mgr.x + mgrW/2 + 20 : 0,
      (isManagerVisible('mcp_server') && mgrPos.mcp_server) ? mgrPos.mcp_server.x + mgrW/2 + 20 : 0,
      (isManagerVisible('mqtt_pub') && mgrPos.mqtt_pub) ? mgrPos.mqtt_pub.x + mgrW/2 + 20 : 0
    );
    var boundRight = Math.max(
      mgrPos.ui1 ? mgrPos.ui1.x + mgrW/2 + 20 : 0,
      mgrPos.ui2 ? mgrPos.ui2.x + mgrW/2 + 20 : 0,
      mgrPos.nga ? mgrPos.nga.x + mgrW/2 + 20 : 0,
      insideExtRight
    );
    var boundBottom = Math.max(
      mgrPos.dm ? mgrPos.dm.y + mgrH/2 + 30 : 0,
      mgrPos.nga ? mgrPos.nga.y + mgrH/2 + 30 : 0,
      mgrPos.ui2 ? mgrPos.ui2.y + mgrH/2 + 30 : 0
    );
    ctx.save();
    ctx.setLineDash([10, 6]);
    ctx.strokeStyle = 'rgba(96,165,250,0.15)';
    ctx.lineWidth = 1.5;
    drawRoundedRect(boundLeft, boundTop, boundRight - boundLeft, boundBottom - boundTop, 16);
    ctx.stroke();
    ctx.setLineDash([]);
    // Label
    ctx.font = '600 11px "Segoe UI", system-ui, sans-serif';
    ctx.fillStyle = 'rgba(96,165,250,0.3)';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText('WinCC OA', boundLeft + 12, boundTop + 6);
    ctx.restore();
  }

  // Connection lines (faint) — from EV to other WinCC OA managers
  ctx.strokeStyle = 'rgba(96,165,250,0.18)';
  ctx.lineWidth = 1.5;
  var evP = mgrPos.ev;
  for (var id in managers) {
    if (!managers.hasOwnProperty(id)) continue;
    if (!isManagerVisible(id)) continue;
    if (id === 'ev' || id === 'plc' || id === 'pgsql' || id === 'kafka' || id === 'pred_maint' || id === 'claude_app' || id === 'anthropic' || id === 'mqtt_broker' || id === 'uns_mes' || id === 'uns_hist') continue;
    var p = mgrPos[id];
    if (!p) continue;
    ctx.beginPath();
    ctx.moveTo(evP.x, evP.y);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
  }
  // Driver <-> PLC line (OPC UA)
  if (mgrPos.driver && mgrPos.plc) {
    ctx.save();
    ctx.strokeStyle = 'rgba(148,163,184,0.35)';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(mgrPos.driver.x, mgrPos.driver.y);
    ctx.lineTo(mgrPos.plc.x, mgrPos.plc.y);
    ctx.stroke();
    ctx.setLineDash([]);
    // "OPC UA" label on the link
    var midX = (mgrPos.driver.x + mgrPos.plc.x) / 2;
    var midY = (mgrPos.driver.y + mgrPos.plc.y) / 2 - 12;
    ctx.font = '600 9px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(148,163,184,0.55)';
    ctx.fillText('OPC UA', midX, midY);
    ctx.restore();
  }

  // NGA <-> PostgreSQL line (external database)
  if (mgrPos.nga && mgrPos.pgsql) {
    ctx.save();
    ctx.strokeStyle = 'rgba(51,103,145,0.4)';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(mgrPos.nga.x, mgrPos.nga.y);
    ctx.lineTo(mgrPos.pgsql.x, mgrPos.pgsql.y);
    ctx.stroke();
    ctx.setLineDash([]);
    var midX = (mgrPos.nga.x + mgrPos.pgsql.x) / 2;
    var midY = (mgrPos.nga.y + mgrPos.pgsql.y) / 2 - 12;
    ctx.font = '600 9px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(51,103,145,0.6)';
    ctx.fillText('SQL', midX + 14, midY);
    ctx.restore();
  }
  // NGA <-> DM link (history read return path)
  if (mgrPos.nga && mgrPos.dm) {
    ctx.strokeStyle = 'rgba(139,92,246,0.2)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(mgrPos.nga.x, mgrPos.nga.y);
    ctx.lineTo(mgrPos.dm.x, mgrPos.dm.y);
    ctx.stroke();
  }
  // JS Manager <-> Kafka line
  if (isManagerVisible('kafka') && mgrPos.js_mgr && mgrPos.kafka) {
    ctx.save();
    ctx.strokeStyle = 'rgba(6,182,212,0.35)';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(mgrPos.js_mgr.x, mgrPos.js_mgr.y);
    ctx.lineTo(mgrPos.kafka.x, mgrPos.kafka.y);
    ctx.stroke();
    ctx.setLineDash([]);
    var midX = (mgrPos.js_mgr.x + mgrPos.kafka.x) / 2;
    var midY = (mgrPos.js_mgr.y + mgrPos.kafka.y) / 2 - 12;
    ctx.font = '600 9px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(6,182,212,0.6)';
    ctx.fillText('Kafka', midX, midY);
    ctx.restore();
  }
  // Kafka <-> Predictive Maintenance line
  if (isManagerVisible('pred_maint') && mgrPos.kafka && mgrPos.pred_maint) {
    ctx.save();
    ctx.strokeStyle = 'rgba(20,184,166,0.35)';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(mgrPos.kafka.x, mgrPos.kafka.y);
    ctx.lineTo(mgrPos.pred_maint.x, mgrPos.pred_maint.y);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }
  // MCP Server <-> Claude Desktop App line
  if (isManagerVisible('mcp_server') && mgrPos.mcp_server && mgrPos.claude_app) {
    ctx.save();
    ctx.strokeStyle = 'rgba(217,70,239,0.35)';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(mgrPos.mcp_server.x, mgrPos.mcp_server.y);
    ctx.lineTo(mgrPos.claude_app.x, mgrPos.claude_app.y);
    ctx.stroke();
    ctx.setLineDash([]);
    var midX = (mgrPos.mcp_server.x + mgrPos.claude_app.x) / 2;
    var midY = (mgrPos.mcp_server.y + mgrPos.claude_app.y) / 2 - 12;
    ctx.font = '600 9px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(217,70,239,0.6)';
    ctx.fillText('MCP', midX, midY);
    ctx.restore();
  }
  // Claude Desktop App <-> Anthropic API line
  if (isManagerVisible('anthropic') && mgrPos.claude_app && mgrPos.anthropic) {
    ctx.save();
    ctx.strokeStyle = 'rgba(217,70,239,0.35)';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(mgrPos.claude_app.x, mgrPos.claude_app.y);
    ctx.lineTo(mgrPos.anthropic.x, mgrPos.anthropic.y);
    ctx.stroke();
    ctx.setLineDash([]);
    var midX = (mgrPos.claude_app.x + mgrPos.anthropic.x) / 2;
    var midY = (mgrPos.claude_app.y + mgrPos.anthropic.y) / 2 - 12;
    ctx.font = '600 9px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(217,70,239,0.6)';
    ctx.fillText('API', midX, midY);
    ctx.restore();
  }
  // EV <-> MCP Server line (direct connection)
  if (isManagerVisible('mcp_server') && mgrPos.ev && mgrPos.mcp_server) {
    ctx.strokeStyle = 'rgba(168,85,247,0.2)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(mgrPos.ev.x, mgrPos.ev.y);
    ctx.lineTo(mgrPos.mcp_server.x, mgrPos.mcp_server.y);
    ctx.stroke();
  }
  // MQTT Publisher <-> Mosquitto Broker line
  if (isManagerVisible('mqtt_pub') && mgrPos.mqtt_pub && mgrPos.mqtt_broker) {
    ctx.save();
    ctx.strokeStyle = 'rgba(34,211,238,0.35)';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(mgrPos.mqtt_pub.x, mgrPos.mqtt_pub.y);
    ctx.lineTo(mgrPos.mqtt_broker.x, mgrPos.mqtt_broker.y);
    ctx.stroke();
    ctx.setLineDash([]);
    var midX = (mgrPos.mqtt_pub.x + mgrPos.mqtt_broker.x) / 2;
    var midY = (mgrPos.mqtt_pub.y + mgrPos.mqtt_broker.y) / 2 - 12;
    ctx.font = '600 9px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(34,211,238,0.6)';
    ctx.fillText('MQTT', midX, midY);
    ctx.restore();
  }
  // Mosquitto <-> MES line
  if (isManagerVisible('uns_mes') && mgrPos.mqtt_broker && mgrPos.uns_mes) {
    ctx.save();
    ctx.strokeStyle = 'rgba(132,204,22,0.35)';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(mgrPos.mqtt_broker.x, mgrPos.mqtt_broker.y);
    ctx.lineTo(mgrPos.uns_mes.x, mgrPos.uns_mes.y);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }
  // Mosquitto <-> Cloud Historian line
  if (isManagerVisible('uns_hist') && mgrPos.mqtt_broker && mgrPos.uns_hist) {
    ctx.save();
    ctx.strokeStyle = 'rgba(132,204,22,0.35)';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(mgrPos.mqtt_broker.x, mgrPos.mqtt_broker.y);
    ctx.lineTo(mgrPos.uns_hist.x, mgrPos.uns_hist.y);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }
  // EV <-> MQTT Publisher line
  if (isManagerVisible('mqtt_pub') && mgrPos.ev && mgrPos.mqtt_pub) {
    ctx.strokeStyle = 'rgba(34,211,238,0.2)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(mgrPos.ev.x, mgrPos.ev.y);
    ctx.lineTo(mgrPos.mqtt_pub.x, mgrPos.mqtt_pub.y);
    ctx.stroke();
  }

  // Managers (only visible ones)
  for (var id in managers) {
    if (!managers.hasOwnProperty(id)) continue;
    if (isManagerVisible(id)) drawManager(id);
  }

  // Animated messages
  var speed = getSpeed();
  for (var i = messages.length - 1; i >= 0; i--) {
    var msg = messages[i];
    var from = mgrPos[msg.from];
    var to = mgrPos[msg.to];
    if (!from || !to) { messages.splice(i, 1); continue; }

    // Hold time: keep arrow visible after arrival (in ms, adjusted by speed)
    var holdFrames = Math.round(400 / (16 * speed)); // ~400ms hold

    // self-arrow (internal)
    if (msg.from === msg.to) {
      if (msg.progress < 1) {
        msg.progress += msg.speed * speed;
        if (msg.progress >= 1) { msg.progress = 1; msg.holdCount = 0; }
      } else {
        msg.holdCount = (msg.holdCount || 0) + 1;
        if (msg.holdCount >= holdFrames) {
          messages.splice(i, 1);
          msg.onDone();
          continue;
        }
      }
      // Draw a small loop
      var lcx = from.x, lcy = from.y - mgrH/2 - 20;
      var r = 18;
      var angle = Math.min(msg.progress, 1) * Math.PI * 2;
      ctx.beginPath();
      ctx.arc(lcx, lcy, r, 0, angle);
      ctx.strokeStyle = msg.color;
      ctx.lineWidth = 3;
      ctx.stroke();
      // Label
      if (msg.label) {
        ctx.font = '600 10px "Consolas", "Fira Code", monospace';
        ctx.textAlign = 'center';
        ctx.fillStyle = msg.color;
        ctx.fillText(msg.label, lcx, lcy - r - 6);
      }
      continue;
    }

    drawArrow(from.x, from.y, to.x, to.y, msg.color, Math.min(msg.progress, 1), msg.label);
    if (msg.progress < 1) {
      msg.progress += msg.speed * speed;
      if (msg.progress >= 1) { msg.progress = 1; msg.holdCount = 0; }
    } else {
      msg.holdCount = (msg.holdCount || 0) + 1;
      if (msg.holdCount >= holdFrames) {
        messages.splice(i, 1);
        msg.onDone();
      }
    }
  }

  // Update glows
  for (var gid in glowManagers) {
    if (!glowManagers.hasOwnProperty(gid)) continue;
    var g = glowManagers[gid];
    g.t += 16 * getSpeed();
    if (g.t >= g.duration) delete glowManagers[gid];
  }

  requestAnimationFrame(draw);
}
draw();

renderProcessImage();

// === core/engine.js ===
// ── SCENARIO ENGINE ──
var scenarioRunning = false;
var stepMode = false;
var stepResolve = null;
var currentSteps = [];
var currentStepIdx = 0;
var currentScenarioName = '';
var replayTarget = -1;
var replayMode = false;
var globalStepIdx = 0;
var pendingScenario = null;
var scenarioGen = 0;
var currentGen = 0;
var autoAdvanceFirst = false;

function checkCancelled() {
  if (currentGen !== scenarioGen) throw 'scenario_cancelled';
}

var scenarioTitles = {
  dpGet: 'S1 \u2014 dpGet',
  dpSet: 'S2 \u2014 dpSet',
  dpConnect: 'S3 \u2014 dpConnect',
  plcLive: 'S4 \u2014 PLC Live',
  cycle: 'S5 \u2014 Cycle complet',
  history: 'S6 \u2014 Lecture historique',
  kafka: 'S7 \u2014 Node.js \u2192 Kafka',
  mcp: 'S8 \u2014 Claude AI (MCP)',
  uns: 'S9 \u2014 UNS (MQTT)',
};

function setButtons(disabled) {
  document.getElementById('btn-dpget').disabled = disabled;
  document.getElementById('btn-dpset').disabled = disabled;
  document.getElementById('btn-dpconnect').disabled = disabled;
  document.getElementById('btn-plclive').disabled = disabled;
  document.getElementById('btn-cycle').disabled = disabled;
  document.getElementById('btn-history').disabled = disabled;
  document.getElementById('btn-kafka').disabled = disabled;
  document.getElementById('btn-mcp').disabled = disabled;
  document.getElementById('btn-uns').disabled = disabled;
}

function showStep(num, total, html) {
  document.getElementById('idle-msg').style.display = 'none';
  document.getElementById('scenario-intro').style.display = 'none';
  var sn = document.getElementById('step-num');
  var st = document.getElementById('step-text');
  sn.style.display = '';
  st.style.display = '';
  sn.textContent = num + ' / ' + total;
  st.innerHTML = html;
  // Update navigation buttons
  document.getElementById('btn-prev').disabled = (num <= 1);
  if (num >= total) {
    document.getElementById('btn-step').textContent = '\u2713';
  } else {
    document.getElementById('btn-step').innerHTML = t('nextBtn') + ' &#9656;';
  }
}

function hideStep() {
  var idleEl = document.getElementById('idle-msg');
  idleEl.style.display = '';
  idleEl.textContent = 'Choose a scenario to start the animation.';
  document.getElementById('step-num').style.display = 'none';
  document.getElementById('step-text').style.display = 'none';
  document.getElementById('scenario-intro').style.display = 'none';
  document.getElementById('btn-start-scenario').style.display = 'none';
}

function wait(ms) {
  checkCancelled();
  if (replayMode) return new Promise(function(r) { setTimeout(r, 5); });
  return new Promise(function(r) { setTimeout(r, ms / getSpeed()); });
}

async function waitForStep() {
  checkCancelled();
  // In replay mode, auto-advance until reaching target
  if (replayMode && globalStepIdx < replayTarget) {
    globalStepIdx++;
    document.getElementById('btn-prev').disabled = (globalStepIdx <= 0);
    await wait(50);
    return;
  }
  if (replayMode && globalStepIdx >= replayTarget) {
    replayMode = false;
    // Fall through to normal step wait
  }

  globalStepIdx++;
  document.getElementById('btn-prev').disabled = (globalStepIdx <= 1);

  // Auto-advance on first step after Start is clicked
  if (autoAdvanceFirst) {
    autoAdvanceFirst = false;
    document.getElementById('btn-step').disabled = false;
    return;
  }

  document.getElementById('btn-step').disabled = false;
  return new Promise(function(r) { stepResolve = r; });
}

function nextStep() {
  if (stepResolve) {
    document.getElementById('btn-step').disabled = true;
    stepResolve();
    stepResolve = null;
  }
}

function showScenarioIntro(name) {
  if (scenarioRunning) return;
  pendingScenario = name;

  // Show relevant managers for this scenario
  visibleManagers = new Set(scenarioVisibility[name] || BASE_MANAGERS);
  if (typeof rebuild3DNodes === 'function') rebuild3DNodes();

  document.getElementById('idle-msg').style.display = 'none';
  document.getElementById('step-num').style.display = 'none';
  document.getElementById('step-text').style.display = 'none';
  document.getElementById('scenario-intro').style.display = 'flex';
  document.getElementById('intro-title').textContent = scenarioTitles[name] || name;
  document.getElementById('intro-desc').innerHTML = t('intro_' + name);

  // Show start button in controls bar
  document.getElementById('btn-start-scenario').style.display = '';
}

function startPendingScenario() {
  if (!pendingScenario) return;
  document.getElementById('scenario-intro').style.display = 'none';
  document.getElementById('btn-start-scenario').style.display = 'none';
  var name = pendingScenario;
  pendingScenario = null;
  autoAdvanceFirst = true;
  runScenario(name);
}

async function prevStep() {
  if (!scenarioRunning || globalStepIdx <= 1) return;
  var targetStep = globalStepIdx - 2; // go back one step (0-based)
  var scenarioName = currentScenarioName;

  // Cancel current scenario via generation counter
  scenarioGen++;
  if (stepResolve) {
    stepResolve();
    stepResolve = null;
  }
  // Let the cancelled scenario unwind
  await new Promise(function(r) { setTimeout(r, 20); });

  // Reset everything
  messages = [];
  subscriptions = [];
  highlightSubs = [];
  piFlash = {};
  glowManagers = {};
  processImage = {
    'TC_101.temperature': 820.0,
    'PID_TOP.setpoint': 900.0,
    'PID_TOP.output': 65.0,
    'HR_TOP.power': 65.0,
    'TC_102.temperature': 815.0,
    'CYCLE_001.phase': 'rampe',
  };
  renderSubTable();
  renderProcessImage();

  // Set replay mode
  replayMode = true;
  replayTarget = targetStep;
  globalStepIdx = 0;
  scenarioRunning = false; // allow re-entry

  // Re-run the scenario (will auto-advance in replay mode)
  await runScenario(scenarioName);
}

function msgDuration() {
  return 600 / getSpeed();
}

var COLORS = {
  request: '#3b82f6',
  write: '#3b82f6',
  notify: '#f59e0b',
  callback: '#10b981',
  response: '#10b981',
  internal: '#6366f1',
  archive: '#ec4899',
};

// ── Scenario Registry ──
var scenarioRegistry = {};

function registerScenario(name, fn) {
  scenarioRegistry[name] = fn;
}

async function runScenario(name) {
  if (scenarioRunning) return;
  currentScenarioName = name;
  scenarioRunning = true;
  currentGen = ++scenarioGen;
  setButtons(true);
  stepMode = true; // ALL scenarios are now step mode
  messages = [];
  highlightSubs = [];
  globalStepIdx = 0;

  // Set visible managers for this scenario
  visibleManagers = new Set(scenarioVisibility[name] || BASE_MANAGERS);
  if (typeof rebuild3DNodes === 'function') rebuild3DNodes();

  document.getElementById('btn-step').disabled = false;
  document.getElementById('btn-prev').disabled = true; // disabled at step 0

  var scenarioFn = scenarioRegistry[name];
  if (!scenarioFn) return;

  try {
    await scenarioFn();
  } catch (e) {
    if (e === 'scenario_cancelled') return;
    throw e;
  }

  if (currentGen !== scenarioGen) return; // stale run

  await wait(500);
  hideStep();
  scenarioRunning = false;
  setButtons(false);
  document.getElementById('btn-step').disabled = true;
  document.getElementById('btn-prev').disabled = true;
  replayMode = false;
  replayTarget = -1;
}

function resetAll() {
  messages = [];
  subscriptions = [];
  highlightSubs = [];
  piFlash = {};
  glowManagers = {};
  visibleManagers = new Set(BASE_MANAGERS);
  if (typeof rebuild3DNodes === 'function') rebuild3DNodes();
  processImage = {
    'TC_101.temperature': 820.0,
    'PID_TOP.setpoint': 900.0,
    'PID_TOP.output': 65.0,
    'HR_TOP.power': 65.0,
    'TC_102.temperature': 815.0,
    'CYCLE_001.phase': 'rampe',
  };
  renderSubTable();
  renderProcessImage();
  hideStep();
  scenarioRunning = false;
  stepResolve = null;
  pendingScenario = null;
  replayMode = false;
  replayTarget = -1;
  globalStepIdx = 0;
  document.getElementById('scenario-intro').style.display = 'none';
  document.getElementById('btn-start-scenario').style.display = 'none';
  setButtons(false);
  document.getElementById('btn-step').disabled = true;
  document.getElementById('btn-prev').disabled = true;
}

async function scenarioCycle() {
  // Start clean
  subscriptions = [];
  renderSubTable();
  processImage['TC_101.temperature'] = 820.0;
  processImage['PID_TOP.output'] = 65.0;
  renderProcessImage();

  var steps = 12;

  // Step 1: CTRL PID dpConnect
  showStep(1, steps, t('cycle_1'));
  await waitForStep();
  glowManager('ctrl_pid', 'rgba(16,185,129', 1200);
  await addMessage('ctrl_pid', 'ev', 'dpConnect(onTemp, TC_101.temp)', COLORS.request, msgDuration());
  glowManager('ev', 'rgba(59,130,246', 800);
  subscriptions.push({ mgr: 'ctrl_pid', mgrLabel: 'CTRL PID', dpe: 'TC_101.temp', cb: 'onTemp' });
  highlightSubs = [0];
  renderSubTable();
  await addMessage('ev', 'ev', 'register subscription', COLORS.internal, msgDuration() * 0.4);
  // EV sends initial value
  await addMessage('ev', 'ctrl_pid', 'notif(820.0)', COLORS.notify, msgDuration() * 0.7);
  await addMessage('ctrl_pid', 'ctrl_pid', '-> callback onTemp()', COLORS.callback, msgDuration() * 0.3);
  highlightSubs = [];
  renderSubTable();

  // Step 2: All 3 UIs dpConnect
  showStep(2, steps, t('cycle_2'));
  await waitForStep();
  // UI1 subscribes to TC_101.temp and PID_TOP.output
  glowManager('ui1', 'rgba(245,158,11', 1400);
  await addMessage('ui1', 'ev', 'dpConnect(updateDisp, TC_101.temp)', COLORS.request, msgDuration());
  glowManager('ev', 'rgba(59,130,246', 600);
  subscriptions.push({ mgr: 'ui1', mgrLabel: 'UI Operator', dpe: 'TC_101.temp', cb: 'updateDisp' });
  highlightSubs = [subscriptions.length - 1];
  renderSubTable();
  await addMessage('ev', 'ev', 'register', COLORS.internal, msgDuration() * 0.3);
  await addMessage('ev', 'ui1', 'notif(820.0)', COLORS.notify, msgDuration() * 0.5);

  await addMessage('ui1', 'ev', 'dpConnect(updateDisp, PID_TOP.output)', COLORS.request, msgDuration() * 0.8);
  subscriptions.push({ mgr: 'ui1', mgrLabel: 'UI Operator', dpe: 'PID_TOP.output', cb: 'updateDisp' });
  highlightSubs = [subscriptions.length - 1];
  renderSubTable();
  await addMessage('ev', 'ev', 'register', COLORS.internal, msgDuration() * 0.3);
  await addMessage('ev', 'ui1', 'notif(65.0)', COLORS.notify, msgDuration() * 0.5);

  // UI Monitoring subscribes to TC_101.temp and PID_TOP.setpoint
  glowManager('ui2', 'rgba(234,179,8', 1200);
  await addMessage('ui2', 'ev', 'dpConnect(updateTrend, TC_101.temp)', COLORS.request, msgDuration() * 0.8);
  subscriptions.push({ mgr: 'ui2', mgrLabel: 'UI Monitoring', dpe: 'TC_101.temp', cb: 'updateTrend' });
  highlightSubs = [subscriptions.length - 1];
  renderSubTable();
  await addMessage('ev', 'ev', 'register', COLORS.internal, msgDuration() * 0.3);
  await addMessage('ev', 'ui2', 'notif(820.0)', COLORS.notify, msgDuration() * 0.5);

  await addMessage('ui2', 'ev', 'dpConnect(checkAlarm, PID_TOP.setpoint)', COLORS.request, msgDuration() * 0.8);
  subscriptions.push({ mgr: 'ui2', mgrLabel: 'UI Monitoring', dpe: 'PID_TOP.setpoint', cb: 'checkAlarm' });
  highlightSubs = [subscriptions.length - 1];
  renderSubTable();
  await addMessage('ev', 'ev', 'register', COLORS.internal, msgDuration() * 0.3);
  await addMessage('ev', 'ui2', 'notif(900.0)', COLORS.notify, msgDuration() * 0.5);
  highlightSubs = [];
  renderSubTable();

  // Step 3: PLC sends value to Driver
  showStep(3, steps, t('cycle_3'));
  await waitForStep();
  glowManager('plc', 'rgba(148,163,184', 1000);
  await addMessage('plc', 'driver', 'OPC UA Read -> 845.2', '#94a3b8', msgDuration());
  glowManager('driver', 'rgba(249,115,22', 1000);
  await addMessage('driver', 'ev', 'dpSet(TC_101.temp, 845.2)', COLORS.write, msgDuration());

  // Step 4: EV updates process image
  showStep(4, steps, t('cycle_4'));
  await waitForStep();
  glowManager('ev', 'rgba(59,130,246', 800);
  processImage['TC_101.temperature'] = 845.2;
  piFlash['TC_101.temperature'] = true;
  renderProcessImage();
  await addMessage('ev', 'ev', 'update process image', COLORS.internal, msgDuration() * 0.4);
  piFlash['TC_101.temperature'] = false;
  renderProcessImage();

  // Step 5: EV → DM (persistence) AND EV → NGA → PostgreSQL (Online Change) in parallel
  showStep(5, steps, t('cycle_5'));
  await waitForStep();
  await addMessagesParallel([
    { from: 'ev', to: 'dm', label: 'persistence (SQLite)', color: COLORS.internal, duration: msgDuration() * 0.6 },
    { from: 'ev', to: 'nga', label: 'Online Change', color: COLORS.archive, duration: msgDuration() * 0.6 },
  ]);
  glowManager('dm', 'rgba(139,92,246', 600);
  glowManager('nga', 'rgba(236,72,153', 500);
  await addMessage('nga', 'pgsql', 'INSERT INTO history', '#336791', msgDuration() * 0.5);
  glowManager('pgsql', 'rgba(51,103,145', 500);

  // Step 6: Notify CTRL PID
  showStep(6, steps, t('cycle_6'));
  await waitForStep();
  highlightSubs = [0];
  renderSubTable();
  await addMessage('ev', 'ctrl_pid', 'notif(845.2)', COLORS.notify, msgDuration());
  glowManager('ctrl_pid', 'rgba(16,185,129', 1000);
  await addMessage('ctrl_pid', 'ctrl_pid', '-> callback onTemp()', COLORS.callback, msgDuration() * 0.4);
  highlightSubs = [];
  renderSubTable();

  // Step 7: Notify both UIs (multicast) — subscribed to TC_101.temp: UI Operator, UI Monitoring
  showStep(7, steps, t('cycle_7'));
  await waitForStep();
  // UI1 and UI2 are subscribed to TC_101.temp
  highlightSubs = [1, 3]; // indices of UI1 TC_101.temp and UI2 TC_101.temp
  renderSubTable();
  await addMessagesParallel([
    { from: 'ev', to: 'ui1', label: 'notif(845.2)', color: COLORS.notify, duration: msgDuration() },
    { from: 'ev', to: 'ui2', label: 'notif(845.2)', color: COLORS.notify, duration: msgDuration() },
  ]);
  glowManager('ui1', 'rgba(245,158,11', 800);
  glowManager('ui2', 'rgba(234,179,8', 800);
  await addMessagesParallel([
    { from: 'ui1', to: 'ui1', label: '-> updateDisp()', color: COLORS.callback, duration: msgDuration() * 0.3 },
    { from: 'ui2', to: 'ui2', label: '-> updateTrend()', color: COLORS.callback, duration: msgDuration() * 0.3 },
  ]);
  highlightSubs = [];
  renderSubTable();

  // Step 8: CTRL PID dpSet output
  showStep(8, steps, t('cycle_8'));
  await waitForStep();
  glowManager('ctrl_pid', 'rgba(16,185,129', 800);
  await addMessage('ctrl_pid', 'ev', 'dpSet(PID_TOP.output, 72.5)', COLORS.write, msgDuration());
  glowManager('ev', 'rgba(59,130,246', 800);
  processImage['PID_TOP.output'] = 72.5;
  processImage['HR_TOP.power'] = 72.5;
  piFlash['PID_TOP.output'] = true;
  renderProcessImage();
  await addMessage('ev', 'ev', 'update process image', COLORS.internal, msgDuration() * 0.3);
  piFlash['PID_TOP.output'] = false;
  renderProcessImage();

  // Step 9: DM + NGA for output + notify UI1 (subscribed to PID_TOP.output)
  showStep(9, steps, t('cycle_9'));
  await waitForStep();
  await addMessagesParallel([
    { from: 'ev', to: 'dm', label: 'persistence (SQLite)', color: COLORS.internal, duration: msgDuration() * 0.5 },
    { from: 'ev', to: 'nga', label: 'Online Change', color: COLORS.archive, duration: msgDuration() * 0.5 },
  ]);
  glowManager('dm', 'rgba(139,92,246', 500);
  glowManager('nga', 'rgba(236,72,153', 500);
  await addMessage('nga', 'pgsql', 'INSERT INTO history', '#336791', msgDuration() * 0.4);
  glowManager('pgsql', 'rgba(51,103,145', 500);
  // UI1 is subscribed to PID_TOP.output
  highlightSubs = [2]; // index of UI1 PID_TOP.output
  renderSubTable();
  await addMessage('ev', 'ui1', 'notif(72.5%)', COLORS.notify, msgDuration());
  glowManager('ui1', 'rgba(245,158,11', 800);
  await addMessage('ui1', 'ui1', '-> updateDisp()', COLORS.callback, msgDuration() * 0.4);
  highlightSubs = [];
  renderSubTable();

  // Step 10: Driver receives command + sends to PLC
  showStep(10, steps, t('cycle_10'));
  await waitForStep();
  await addMessage('ev', 'driver', 'notif(72.5)', COLORS.notify, msgDuration());
  glowManager('driver', 'rgba(249,115,22', 1200);
  await addMessage('driver', 'plc', 'OPC UA Write -> 72.5%', '#94a3b8', msgDuration());
  glowManager('plc', 'rgba(148,163,184', 800);

  // Step 11: PLC responds with new temperature
  showStep(11, steps, t('cycle_11'));
  await waitForStep();
  glowManager('plc', 'rgba(148,163,184', 1000);
  await addMessage('plc', 'driver', 'OPC UA Read -> 847.8', '#94a3b8', msgDuration());
  glowManager('driver', 'rgba(249,115,22', 800);
  await addMessage('driver', 'ev', 'dpSet(TC_101.temp, 847.8)', COLORS.write, msgDuration());
  processImage['TC_101.temperature'] = 847.8;
  piFlash['TC_101.temperature'] = true;
  renderProcessImage();
  await wait(400);
  piFlash['TC_101.temperature'] = false;
  renderProcessImage();

  // Step 12: Summary
  showStep(12, steps, t('cycle_12'));
  await waitForStep();
  // Flash all managers sequentially for visual effect
  var order = ['plc', 'driver', 'ev', 'dm', 'nga', 'ctrl_pid', 'ui1', 'ui2'];
  for (var j = 0; j < order.length; j++) {
    var id = order[j];
    var c = managers[id].color;
    var r = parseInt(c.slice(1,3), 16);
    var g = parseInt(c.slice(3,5), 16);
    var b = parseInt(c.slice(5,7), 16);
    glowManager(id, 'rgba(' + r + ',' + g + ',' + b, 1500);
    await wait(100);
  }
}

registerScenario('cycle', scenarioCycle);

// === mobile-viewport.js ===
// ── MOBILE VIEWPORT: Camera follow + Overview + Persistent messages ──
// Loaded after renderer.js — overrides resize(), draw(), addMessage(), glowManager()

// Virtual layout dimensions (desktop scale for readable managers)
var VIRTUAL_W = 1200;
var VIRTUAL_H = 700;

// Camera state
var camera = {
  x: 0, y: 0, zoom: 0.4,
  targetX: 0, targetY: 0, targetZoom: 0.4
};
var overviewMode = true;

// ── Persistent messages ──
// Completed arrows that stay visible until destination node glows
var persistentMessages = []; // { from, to, label, color }

// Override addMessage: keep a persistent copy after the arrow animation completes
var _origAddMessage = addMessage;
addMessage = function(fromId, toId, label, color, duration) {
  var promise = _origAddMessage(fromId, toId, label, color, duration);
  promise.then(function() {
    // Keep arrow visible as a persistent overlay
    persistentMessages.push({
      from: fromId, to: toId, label: label, color: color
    });
  });
  return promise;
};

// Override glowManager: when a node highlights, clear persistent arrows pointing TO it
var _origGlowManager = glowManager;
glowManager = function(id, color, duration) {
  persistentMessages = persistentMessages.filter(function(pm) {
    return pm.to !== id;
  });
  _origGlowManager(id, color, duration);
};

// Compute overview target: fit all visible managers in viewport
function computeOverviewTarget() {
  var minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  for (var id in managers) {
    if (!managers.hasOwnProperty(id)) continue;
    if (!isManagerVisible(id)) continue;
    var p = mgrPos[id];
    if (!p) continue;
    minX = Math.min(minX, p.x - mgrW / 2);
    maxX = Math.max(maxX, p.x + mgrW / 2);
    minY = Math.min(minY, p.y - mgrH / 2);
    maxY = Math.max(maxY, p.y + mgrH / 2);
  }
  if (minX === Infinity) return;
  var margin = 50;
  minX -= margin; minY -= margin; maxX += margin; maxY += margin;
  camera.targetX = (minX + maxX) / 2;
  camera.targetY = (minY + maxY) / 2;
  // Account for step bar (~40px top) and control bar (~60px bottom)
  var usableH = canvasH - 100;
  if (usableH < 100) usableH = canvasH;
  camera.targetZoom = Math.min(
    canvasW / (maxX - minX),
    usableH / (maxY - minY)
  );
}

// Update camera each frame
function updateCamera() {
  if (overviewMode) {
    computeOverviewTarget();
  } else if (messages.length > 0) {
    var msg = messages[messages.length - 1];
    var from = mgrPos[msg.from];
    var to = mgrPos[msg.to];
    if (from && to) {
      if (msg.from === msg.to) {
        // Self-message: center on the manager
        camera.targetX = from.x;
        camera.targetY = from.y;
        camera.targetZoom = Math.min(canvasW / (mgrW * 5), canvasH / (mgrH * 5), 1.2);
      } else {
        // Center between source and destination
        camera.targetX = (from.x + to.x) / 2;
        camera.targetY = (from.y + to.y) / 2;
        // Zoom to fit both managers with padding
        var dx = Math.abs(to.x - from.x) + mgrW * 3.5;
        var dy = Math.abs(to.y - from.y) + mgrH * 4;
        camera.targetZoom = Math.min(canvasW / dx, canvasH / dy, 1.2);
        camera.targetZoom = Math.max(camera.targetZoom, 0.35);
      }
    }
  }
  // Smooth lerp
  var lerp = 0.065;
  camera.x += (camera.targetX - camera.x) * lerp;
  camera.y += (camera.targetY - camera.y) * lerp;
  camera.zoom += (camera.targetZoom - camera.zoom) * lerp;
}

// Override resize: layout at virtual desktop size
resize = function() {
  var area = document.getElementById('canvas-area');
  var dpr = window.devicePixelRatio || 1;
  canvasW = area.clientWidth;
  canvasH = area.clientHeight;
  canvas.width = canvasW * dpr;
  canvas.height = canvasH * dpr;
  canvas.style.width = canvasW + 'px';
  canvas.style.height = canvasH + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  // Layout at virtual desktop size for readable manager boxes
  layoutManagers(VIRTUAL_W, VIRTUAL_H);
  if (overviewMode) {
    computeOverviewTarget();
    // Snap camera immediately on resize
    camera.x = camera.targetX;
    camera.y = camera.targetY;
    camera.zoom = camera.targetZoom;
  }
};
resize();

// Override draw: apply camera transform + render persistent messages
var _origDraw = draw;
draw = function() {
  updateCamera();

  var dpr = window.devicePixelRatio || 1;
  // Clear full canvas with identity transform
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, canvasW, canvasH);

  // Apply camera: translate so camera center maps to screen center
  ctx.save();
  ctx.translate(canvasW / 2, canvasH / 2);
  ctx.scale(camera.zoom, camera.zoom);
  ctx.translate(-camera.x, -camera.y);

  // Original draw handles: clearRect (harmless redo), grid, boundary,
  // connections, managers, messages, glows, requestAnimationFrame(draw)
  _origDraw();

  // Draw persistent messages (completed arrows that stay until node glows)
  for (var i = 0; i < persistentMessages.length; i++) {
    var pm = persistentMessages[i];
    var pfrom = mgrPos[pm.from];
    var pto = mgrPos[pm.to];
    if (!pfrom || !pto) continue;
    if (pm.from === pm.to) {
      // Self-loop
      var lcx = pfrom.x, lcy = pfrom.y - mgrH / 2 - 20;
      ctx.beginPath();
      ctx.arc(lcx, lcy, 18, 0, Math.PI * 2);
      ctx.strokeStyle = pm.color;
      ctx.lineWidth = 3;
      ctx.globalAlpha = 0.7;
      ctx.stroke();
      ctx.globalAlpha = 1;
      if (pm.label) {
        var s = getCanvasScale();
        var fs = Math.max(8, Math.round(10 * s));
        ctx.font = '600 ' + fs + 'px "Consolas", "Fira Code", monospace';
        ctx.textAlign = 'center';
        ctx.fillStyle = pm.color;
        ctx.fillText(pm.label, lcx, lcy - 24);
      }
    } else {
      drawArrow(pfrom.x, pfrom.y, pto.x, pto.y, pm.color, 1.0, pm.label);
    }
  }

  ctx.restore();
};

// ── Auto-play ──
var mobileAutoPlay = true;
var autoPlayTimer = null;
var lastScheduledResolve = null;

// ── Startup state ──
var mobileScenarioStarting = false;
var mobileStartTimer = null;
var mobileStartingName = '';

function scheduleAutoAdvance() {
  if (!mobileAutoPlay || !stepResolve || !scenarioRunning) return;
  if (stepResolve === lastScheduledResolve) return;
  lastScheduledResolve = stepResolve;
  autoPlayTimer = setTimeout(function() {
    if (mobileAutoPlay && stepResolve) {
      nextStep();
      lastScheduledResolve = null;
    }
  }, 1800 / getSpeed());
}

// Poll for stepResolve to auto-advance
setInterval(function() {
  scheduleAutoAdvance();
  // Update play/pause icon when scenario finishes
  if (!scenarioRunning && !mobileScenarioStarting) {
    if (document.getElementById('icon-pause').style.display !== 'none') {
      updatePlayPauseIcon();
    }
    // Clear persistent messages when scenario ends
    if (persistentMessages.length > 0) {
      persistentMessages = [];
    }
  }
}, 200);

// ── Play / Pause ──
function togglePlayPause() {
  // During startup overview: skip delay and start scenario immediately
  if (mobileScenarioStarting) {
    if (mobileStartTimer) {
      clearTimeout(mobileStartTimer);
      mobileStartTimer = null;
    }
    mobileScenarioStarting = false;
    overviewMode = false;
    mobileAutoPlay = true;
    updatePlayPauseIcon();
    runScenario(mobileStartingName);
    return;
  }

  // If scenario is running, toggle play/pause
  if (scenarioRunning) {
    mobileAutoPlay = !mobileAutoPlay;
    updatePlayPauseIcon();
    if (mobileAutoPlay) {
      lastScheduledResolve = null;
      scheduleAutoAdvance();
    } else {
      if (autoPlayTimer) { clearTimeout(autoPlayTimer); autoPlayTimer = null; }
      lastScheduledResolve = null;
    }
    return;
  }

  // Nothing running: go back to menu
  if (!document.getElementById('mobile-menu').classList.contains('visible')) {
    mobileRestart();
  }
}

function updatePlayPauseIcon() {
  var playIcon = document.getElementById('icon-play');
  var pauseIcon = document.getElementById('icon-pause');
  if ((mobileAutoPlay && scenarioRunning) || mobileScenarioStarting) {
    playIcon.style.display = 'none';
    pauseIcon.style.display = '';
  } else {
    playIcon.style.display = '';
    pauseIcon.style.display = 'none';
  }
}

// ── Restart ──
function mobileRestart() {
  // Cancel timers
  if (autoPlayTimer) { clearTimeout(autoPlayTimer); autoPlayTimer = null; }
  if (mobileStartTimer) { clearTimeout(mobileStartTimer); mobileStartTimer = null; }
  lastScheduledResolve = null;
  mobileScenarioStarting = false;

  resetAll();
  persistentMessages = [];
  mobileAutoPlay = true;
  overviewMode = true;
  updatePlayPauseIcon();

  // Show menu
  document.getElementById('mobile-menu').classList.add('visible');
  resize();
}

// ── Scenario selection ──
function mobileSelectScenario(name) {
  // Cancel any pending timers
  if (autoPlayTimer) { clearTimeout(autoPlayTimer); autoPlayTimer = null; }
  if (mobileStartTimer) { clearTimeout(mobileStartTimer); mobileStartTimer = null; }
  lastScheduledResolve = null;

  resetAll();
  persistentMessages = [];

  // Hide menu
  document.getElementById('mobile-menu').classList.remove('visible');

  // Set visible managers for this scenario
  visibleManagers = new Set(scenarioVisibility[name] || BASE_MANAGERS);
  resize();

  // Snap camera to overview
  overviewMode = true;
  computeOverviewTarget();
  camera.x = camera.targetX;
  camera.y = camera.targetY;
  camera.zoom = camera.targetZoom;

  // Mark as starting (guards play button)
  mobileScenarioStarting = true;
  mobileStartingName = name;
  mobileAutoPlay = true;
  updatePlayPauseIcon();

  // Brief overview, then start scenario in follow mode
  mobileStartTimer = setTimeout(function() {
    mobileScenarioStarting = false;
    mobileStartTimer = null;
    overviewMode = false;
    runScenario(name);
  }, 1200);
}

// ── Overview toggle ──
function toggleOverview() {
  overviewMode = !overviewMode;
  document.getElementById('ctrl-overview').classList.toggle('active', overviewMode);
}

// ── Language ──
function mobileSetLang(lang) {
  setLang(lang);
  // Update mobile-specific lang buttons
  var frBtn = document.getElementById('lang-fr-mobile');
  var enBtn = document.getElementById('lang-en-mobile');
  if (frBtn) frBtn.className = 'lang-btn' + (lang === 'fr' ? ' active' : '');
  if (enBtn) enBtn.className = 'lang-btn' + (lang === 'en' ? ' active' : '');
  // Update tile descriptions
  var subtitle = document.getElementById('mobile-menu-subtitle');
  if (subtitle) subtitle.textContent = t('menuSubtitle');
  var scenarios = ['dpGet', 'dpSet', 'dpConnect', 'plcLive', 'cycle', 'history', 'kafka', 'mcp', 'uns'];
  scenarios.forEach(function(s) {
    var el = document.getElementById('tile-desc-' + s);
    if (el) el.textContent = t('tile_' + s);
  });
}

// ── Speed sync ──
(function() {
  var speedMobile = document.getElementById('speed-mobile');
  var speedDesktop = document.getElementById('speed');
  if (speedMobile && speedDesktop) {
    speedMobile.value = speedDesktop.value;
    speedMobile.addEventListener('input', function() {
      speedDesktop.value = speedMobile.value;
      speedDesktop.dispatchEvent(new Event('input'));
    });
  }
})();

// ── Init ──
// Apply detected language to mobile elements
mobileSetLang(currentLang);
// Show menu on load
document.getElementById('mobile-menu').classList.add('visible');

</script>
